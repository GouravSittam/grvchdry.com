grafana:
  enabled: false

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    retention: 2d
    resources:
      requests:
        cpu: 80m
        memory: 120Mi
      limits:
        cpu: 150m
        memory: 200Mi

prometheusOperator:
  resources:
    requests:
      cpu: 30m
      memory: 48Mi
    limits:
      cpu: 80m
      memory: 96Mi
  admissionWebhooks:
    patch:
      resources:
        requests:
          cpu: 10m
          memory: 20Mi
        limits:
          cpu: 30m
          memory: 40Mi

alertmanager:
  enabled: false

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 30m
      memory: 32Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 30m
      memory: 32Mi
